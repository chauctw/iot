<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Giám Sát Tổng Quan KPI</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../shared/gauge.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../shared/gauge.js"></script>
    
    <style>
        :root {
            --page-bg: #f1f5f9;
            --surface: #ffffff;
            --surface-strong: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(15, 23, 42, 0.08);
            --primary: #14b8a6;
            --active: #0d9488;
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
            --space: 5px;            
        }

        .overview-container {
            width: 100%;            
            height: 100%;
            min-height: 0;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--space);
            gap: var(--space);
            box-sizing: border-box;
            overflow: hidden;
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: var(--space);
            background: var(--surface);
            padding: var(--space);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }

        .tab-bar-container { display: flex; background: var(--surface-strong); padding: var(--space); gap: var(--space); flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; padding: 5px 10px; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); cursor: pointer; min-height: 40px; }
        .tab-btn.active { background: var(--surface); color: var(--active); box-shadow: var(--shadow-sm); }

        /* Căn hàng ngang cho các Control lọc thời gian + Dropdown Checkbox */
        .controls-right-flex { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .date-filter-inline { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: var(--text-dark); flex-wrap: wrap; }
        .date-filter-range { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .input-date { padding: 5px 8px; border: 1px solid var(--border-color); font-size: 0.82rem; color: var(--text-dark); background: var(--surface); outline: none; }

        .grid-kpi { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 5px; width: 100%; flex: 0 0 auto; }
        .card { background: var(--surface); border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; flex: 1; }
        .gauge-host { display: flex; justify-content: center; align-items: center; width: 100%; }
        .gauge-host .scada-gauge { width: 100% !important; max-width: 100% !important; }

        .card-header-flex {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding: 6px 10px;
            box-sizing: border-box;
            flex-wrap: nowrap;
            gap: 10px;
        }
        .card-title-inline { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); display: flex; align-items: center; gap: 5px; margin: 0; flex: 1 1 auto; min-width: 0; }

        .controls-right-flex { display: flex; align-items: center; gap: 10px; flex-wrap: nowrap; flex: 0 0 auto; }
        .date-filter-inline { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 600; color: var(--text-dark); flex-wrap: nowrap; white-space: nowrap; }
        .date-filter-range { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; white-space: nowrap; }
        .input-date { width: 140px; min-width: 140px; padding: 5px 8px; border: 1px solid var(--border-color); font-size: 0.82rem; color: var(--text-dark); background: var(--surface); outline: none; }

        .dropdown-checkbox-container { position: relative; display: inline-block; }
        .dropdown-checkbox-btn { background: var(--surface); border: 1px solid var(--border-color); padding: 5px 10px; font-size: 0.82rem; font-weight: 600; color: var(--text-dark); cursor: pointer; display: flex; align-items: center; gap: 8px; min-width: 130px; justify-content: space-between; }
        .dropdown-checkbox-content { display: none; position: absolute; right: 0; background-color: #fff; min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.15); border: 1px solid var(--border-color); z-index: 100; max-height: 250px; overflow-y: auto; padding: 4px 0; }
        .dropdown-checkbox-content.show { display: block; }
        .dropdown-item-cb { padding: 6px 12px; display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-dark); cursor: pointer; }
        .dropdown-item-cb:hover { background-color: #f8fafc; }
        .dropdown-item-cb input[type="checkbox"] { width: 14px; height: 14px; min-width: 14px; min-height: 14px; margin: 0; flex-shrink: 0; accent-color: var(--active); }

        .main-content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; flex: 1 1 auto; min-height: 0; overflow: hidden; }
        .main-content-grid .card { background: var(--surface); padding: 5px; border: 1px solid var(--border-color); display: flex; flex-direction: column; align-items: stretch; }
        .main-content-grid .card > div:last-child { min-height: 0; }
        .table-responsive { width: 100%; flex: 1; min-height: 0; overflow-x: auto; overflow-y: auto; border: 1px solid var(--border-color); background: var(--surface); }
        .station-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        .station-table th, .station-table td { padding: 6px; border-bottom: 1px solid var(--border-color); }
        .station-table th { background-color: #f8fafc; color: var(--text-muted); font-weight: 600; }
        .badge-danger { background-color: #fee2e2; color: #dc2626; padding: 4px; font-size: 11px; font-weight: 600; }
        .refresh-btn { background: var(--active); color: #fff; border: none; padding: 5px 12px; cursor: pointer; font-weight: 500; min-height: 40px; }

        @media (max-width: 1280px) {
            .card-header-flex {
                flex-wrap: wrap;
            }

            .controls-right-flex {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            .date-filter-inline,
            .date-filter-range {
                flex-wrap: wrap;
                white-space: normal;
            }

            .input-date {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body>

<div class="overview-container">
    <div class="header-panel">
        <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
            <h2 style="margin:0; color:#1e293b; font-size: 1.2rem;">TỔNG QUAN CÁC CHỈ SỐ KPI</h2>
            <div class="tab-bar-container">
                <button class="tab-btn" id="tabMonreBtn">LƯU LƯỢNG-BTNMT</button>
                <button class="tab-btn active" id="tabRealtimeBtn">LƯU LƯỢNG-WEB</button>
                <button class="tab-btn" id="tabConsumptionBtn">SẢN LƯỢNG</button>
            </div>
        </div>
        <div>
            <button class="refresh-btn" id="btnRefreshOverview">🔄 LÀM MỚI</button>
        </div>
    </div>

    <div class="grid-kpi" id="dynamicGaugeWrapper"></div>

    <div class="main-content-grid">
        <div class="card" style="align-items: stretch; width: 100%;">
            <div class="card-header-flex">
                <h3 class="card-title-inline" id="chartTitle">
                    <i class="fa-solid fa-chart-line" id="chartIcon" style="color: #10b981; margin-right: 6px;"></i>BIỂU ĐỒ DỮ LIỆU KPI
                </h3>
                
                <div class="controls-right-flex">
                    <div class="date-filter-inline">                        
                        <span>Từ</span>
                        <div class="date-filter-range">
                            <input type="date" id="filterStartDate" class="input-date">
                            <span>đến</span>
                            <input type="date" id="filterEndDate" class="input-date">
                        </div>
                    </div>
                    
                    <div class="dropdown-checkbox-container">
                        <button class="dropdown-checkbox-btn" id="divKpiGroupDropdown">
                            <span id="lblSelectedGroups">Hiển thị: Tất cả</span>
                            <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="dropdown-checkbox-content" id="kpiGroupOptionsWrapper"></div>
                    </div>
                </div>
            </div>
            <div style="flex: 1 1 auto; width: 100%; height: 100%; position: relative; min-height: 0; overflow: hidden;">
                <canvas id="kpiHistoryChart"></canvas>
            </div>
        </div>

        <div class="card" style="align-items: stretch;">
            <div class="card-header-flex">
                <h3 class="card-title-inline" style="color: #334155;">
                    <i class="fa-solid fa-triangle-exclamation" style="color: #dc2626; margin-right: 6px;"></i>DANH SÁCH CẢNH BÁO: Mất kết nối (<span id="lblOfflineSummary">00</span>/<span class="lbl-total-summary">00</span>) - Vi phạm: (<span id="lblViolationSummary">00</span>/<span class="lbl-total-summary">00</span>)
                </h3>
            </div>
            <div class="table-responsive">
                <table class="station-table">
                <thead>
                    <tr>
                        <th style="text-align: left;">Tên Trạm</th>
                        <th style="text-align: center;">Thời Gian</th>
                        <th style="text-align: center;">Tên Tag</th>
                        <th style="text-align: center;">Chi Tiết Lỗi</th>
                        <th style="text-align: center;">Trạng Thái</th>
                    </tr>
                </thead>
                <tbody id="offlineTableBody"></tbody>
            </table>
            </div>
        </div>
    </div>
</div>

<script>
(() => {
    const GAUGE_CONFIGS = [
        { id: "gauge1", title: "TOTAL", color: "#2563eb", max: 2000, stationIds: "monre_35_clnqt4,monre_35_g1,monre_35_g12,monre_35_g15,monre_35_g18,monre_35_g2,monre_35_g20,monre_35_g22,monre_35_g23,monre_35_g24,monre_35_g25,monre_35_g27,monre_35_g4,monre_35_qt3,monre_35_qt4,monre_35_qt5,monre_36_clngs4nm2,monre_36_gs1nm2,monre_36_gs2nm2,monre_36_gs3nm2,monre_36_gs4nm2,monre_36_qt1nm2,monre_36_qt2nm2,monre_391_g21,monre_391_g26,monre_391_qt2m,monre_393_clngs5nm1,monre_393_gs1nm1,monre_393_gs2nm1,monre_393_gs3nm1,monre_393_gs4nm1,monre_393_gs5nm1,monre_393_qt1nm1,monre_393_qt2nm1" },
        { id: "gauge2", title: "GP35", color: "#10b981", max: 2000, stationIds: "monre_35_clnqt4,monre_35_g1,monre_35_g12,monre_35_g15,monre_35_g18,monre_35_g2,monre_35_g20,monre_35_g22,monre_35_g23,monre_35_g24,monre_35_g25,monre_35_g27,monre_35_g4,monre_35_qt3,monre_35_qt4,monre_35_qt5" },
        { id: "gauge3", title: "GP36", color: "#f59e0b", max: 2000, stationIds: "monre_36_clngs4nm2,monre_36_gs1nm2,monre_36_gs2nm2,monre_36_gs3nm2,monre_36_gs4nm2,monre_36_qt1nm2,monre_36_qt2nm2" },
        { id: "gauge4", title: "GP391", color: "#6366f1", max: 1000, stationIds: "monre_391_g21,monre_391_g26,monre_391_qt2m" },
        { id: "gauge5", title: "GP393", color: "#ec4899", max: 1000, stationIds: "monre_393_clngs5nm1,monre_393_gs1nm1,monre_393_gs2nm1,monre_393_gs3nm1,monre_393_gs4nm1,monre_393_gs5nm1,monre_393_qt1nm1,monre_393_qt2nm1" },
        { id: "gauge6", title: "KHÁC", color: "#14b8a6", max: 1000, stationIds: "mqtt_g29a,mqtt_g30a,mqtt_g31b,mqtt_gtacvan,scada_tb1,tva_tb16" }
    ];

    const GAUGE_CONFIGS_REALTIME = [
        { id: "gauge1", title: "TOTAL", color: "#2563eb", max: 2000, stationIds: "scada_tb24,scada_tb1,tva_tb12,mqtt_g15,mqtt_g18,tva_tb2,tva_tb20,tva_tb22,tva_tb23,tva_tb24,tva_tb25,tva_tb27,tva_tb4,tva_qt3,mqtt_qt4,mqtt_qt5,scada_gs4nm2,mqtt_gs1nm2,tva_gs2nm2,tva_gs3nm2,mqtt_qt1nm2,mqtt_qt2nm2,tva_tb21,tva_tb26,mqtt_qt2,scada_gs5nm1,tva_gs1nm1,mqtt_gs2nm1,tva_gs3nm1,scada_gs4nm1,tva_qt1nm1,tva_qt2nm1" },
        { id: "gauge2", title: "GP35", color: "#10b981", max: 2000, stationIds: "scada_tb24,scada_tb1,tva_tb12,mqtt_g15,mqtt_g18,tva_tb2,tva_tb20,tva_tb22,tva_tb23,tva_tb24,tva_tb25,tva_tb27,tva_tb4,tva_qt3,mqtt_qt4,mqtt_qt5" },
        { id: "gauge3", title: "GP36", color: "#f59e0b", max: 2000, stationIds: "scada_gs4nm2,mqtt_gs1nm2,tva_gs2nm2,tva_gs3nm2,mqtt_qt1nm2,mqtt_qt2nm2" },
        { id: "gauge4", title: "GP391", color: "#6366f1", max: 1000, stationIds: "tva_tb21,tva_tb26,mqtt_qt2" },
        { id: "gauge5", title: "GP393", color: "#ec4899", max: 1000, stationIds: "scada_gs5nm1,tva_gs1nm1,mqtt_gs2nm1,tva_gs3nm1,scada_gs4nm1,tva_qt1nm1,tva_qt2nm1" },
        { id: "gauge6", title: "KHÁC", color: "#14b8a6", max: 1000, stationIds: "mqtt_g29a,mqtt_g30a,mqtt_g31b,mqtt_gtacvan,tva_tb16" }
    ];    

    const CHART_COLORS = ['rgb(37, 99, 235)', 'rgb(16, 185, 129)', 'rgb(245, 158, 11)', 'rgb(99, 102, 241)', 'rgb(236, 72, 153)', 'rgb(20, 184, 166)'];

    let currentActiveTab = 'REALTIME';
    let gaugeInstances = {};
    let hChart = null;
    let selectedKpiGroups = [];

    function getRangeInputs() {
        const startInput = document.getElementById('filterStartDate');
        const endInput = document.getElementById('filterEndDate');
        return { startInput, endInput };
    }

    function getLastNDaysRange(daysBack) {
        const endDate = new Date();
        const startDate = new Date();
        startDate.setDate(endDate.getDate() - Math.max(1, Number(daysBack) || 1));

        const toDateInputValue = (date) => {
            const offset = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - offset).toISOString().slice(0, 10);
        };

        return {
            start: toDateInputValue(startDate),
            end: toDateInputValue(endDate)
        };
    }

    function applyConsumptionDefaultRange() {
        const { startInput, endInput } = getRangeInputs();
        if (!startInput || !endInput) return;

        const last2Days = getLastNDaysRange(1);
        startInput.value = last2Days.start;
        endInput.value = last2Days.end;
    }

    function normalizeDateRange() {
        const { startInput, endInput } = getRangeInputs();
        const startDate = startInput?.value || '';
        const endDate = endInput?.value || '';

        if (startDate && endDate && startDate > endDate) {
            if (endInput) endInput.value = startDate;
            return { start: startDate, end: startDate };
        }

        return {
            start: startDate || endDate,
            end: endDate || startDate
        };
    }

    function getRangeQueryParams() {
        const range = normalizeDateRange();
        return {
            start_time: range.start ? `${range.start} 00:00:00` : '',
            end_time: range.end ? `${range.end} 23:59:59` : ''
        };
    }

    function initModule() {
        const todayStr = new Date().toISOString().slice(0, 10);
        const { startInput, endInput } = getRangeInputs();
        if (startInput) startInput.value = todayStr;
        if (endInput) endInput.value = todayStr;

        const wrapper = document.getElementById('dynamicGaugeWrapper');
        if (!wrapper) return;
        
        wrapper.innerHTML = "";
        GAUGE_CONFIGS.forEach(cfg => {
            const cardHtml = `<div class="card"><div id="${cfg.id}Container" class="gauge-host"></div></div>`;
            wrapper.insertAdjacentHTML('beforeend', cardHtml);
        });

        reinitGauges("m³/h");
        buildDropdownCheckboxMenu();
        initChartStructure(); 
        setupTabEvents();

        startInput?.addEventListener('change', fetchDataOverview);
        endInput?.addEventListener('change', fetchDataOverview);
        fetchDataOverview(); 
    }

    function reinitGauges(unitStr) {
        try {
            if (typeof ScadaGauge !== 'undefined') {
                GAUGE_CONFIGS.forEach(cfg => {
                    const hostEl = document.getElementById(`${cfg.id}Container`);
                    if (hostEl) hostEl.innerHTML = "";
                    let activeMax = (unitStr === "m³") ? cfg.max * 15 : cfg.max;

                    gaugeInstances[cfg.id] = new ScadaGauge(`${cfg.id}Container`, {
                        min: 0, max: activeMax, value: 0,
                        title: cfg.title, unit: unitStr,
                        color: cfg.color, decimals: 0 
                    });
                });
            }
        } catch (err) { console.error(err); }
    }

    function buildDropdownCheckboxMenu() {
        const dropdownWrapper = document.getElementById('kpiGroupOptionsWrapper');
        const dropdownBtn = document.getElementById('divKpiGroupDropdown');
        if (!dropdownWrapper || !dropdownBtn) return;

        dropdownWrapper.innerHTML = '';
        selectedKpiGroups = GAUGE_CONFIGS.map(c => c.title);

        GAUGE_CONFIGS.forEach(cfg => {
            const itemHtml = `
                <label class="dropdown-item-cb">
                    <input type="checkbox" value="${cfg.title}" checked class="cls-kpi-checkbox">
                    <span>${cfg.title}</span>
                </label>
            `;
            dropdownWrapper.insertAdjacentHTML('beforeend', itemHtml);
        });

        dropdownBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdownWrapper.classList.toggle('show');
        });

        document.addEventListener('click', () => dropdownWrapper.classList.remove('show'));
        dropdownWrapper.querySelectorAll('.cls-kpi-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                const checkedBoxes = dropdownWrapper.querySelectorAll('.cls-kpi-checkbox:checked');
                selectedKpiGroups = Array.from(checkedBoxes).map(el => el.value);
                const lbl = document.getElementById('lblSelectedGroups');
                if (lbl) {
                    lbl.innerText = checkedBoxes.length === GAUGE_CONFIGS.length ? 'Hiển thị: Tất cả' : `Đã chọn: ${checkedBoxes.length} nhóm`;
                }
                updateChartVisibility();
            });
        });
    }

    function updateChartVisibility() {
        if (!hChart) return;
        GAUGE_CONFIGS.forEach((cfg, index) => {
            if (hChart.data.datasets[index]) {
                const isVisible = selectedKpiGroups.includes(cfg.title);
                hChart.setDatasetVisibility(index, isVisible);
            }
        });
        hChart.update();
    }

    function initChartStructure() {
        const canvasChart = document.getElementById('kpiHistoryChart');
        if (!canvasChart) return;

        const isBar = (currentActiveTab === 'CONSUMPTION'); 

        const chartDatasets = GAUGE_CONFIGS.map((cfg, index) => {
            const baseColor = CHART_COLORS[index % CHART_COLORS.length];
            return {
                label: `${cfg.title}`, 
                data: [], 
                borderColor: baseColor,
                backgroundColor: isBar ? baseColor : baseColor.replace('rgb', 'rgba').replace(')', ', 0.04)'),
                borderWidth: isBar ? 1 : 2,
                tension: 0.2,
                fill: !isBar,
                pointStyle: 'circle',
                pointRadius: isBar ? 0 : 2, 
                barPercentage: 0.6,
                categoryPercentage: 0.8
            };
        });

        if (window.myGlobalKpiChart) window.myGlobalKpiChart.destroy();
        
        const chartType = isBar ? 'bar' : 'line';

        hChart = new Chart(canvasChart.getContext('2d'), {
            type: chartType, 
            data: { labels: [], datasets: chartDatasets },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: { 
                    y: { beginAtZero: true, grid: { color: '#f1f5f9' } }, 
                    x: { grid: { display: false } } 
                },
                // ==========================================
                // THÊM ĐOẠN CONFIG NÀY ĐỂ ẨN THANH CHÚ THÍCH MẶC ĐỊNH
                // ==========================================
                plugins: {
                    legend: {
                        display: false // Ẩn hoàn toàn Legend mặc định của Chart.js
                    }
                }
                // ==========================================
            }
        });
        window.myGlobalKpiChart = hChart;
    }

    function setupTabEvents() {
        const tabs = [
            { id: 'tabMonreBtn', key: 'MONRE', unit: 'm³/h' },
            { id: 'tabRealtimeBtn', key: 'REALTIME', unit: 'm³/h' },
            { id: 'tabConsumptionBtn', key: 'CONSUMPTION', unit: 'm³' }
        ];

        tabs.forEach(tabInfo => {
            const btn = document.getElementById(tabInfo.id);
            if (btn) {
                btn.addEventListener('click', () => {
                    if (currentActiveTab === tabInfo.key) return;
                    currentActiveTab = tabInfo.key;
                    tabs.forEach(t => document.getElementById(t.id)?.classList.remove('active'));
                    btn.classList.add('active');

                    if (tabInfo.key === 'CONSUMPTION') {
                        applyConsumptionDefaultRange();
                    }
                    
                    reinitGauges(tabInfo.unit);
                    initChartStructure(); // Đổi lại cấu trúc line/bar khi chuyển tab[cite: 2]
                    fetchDataOverview();
                });
            }
        });
    }

    async function fetchDataOverview() {
        if (!document.getElementById('offlineTableBody')) return;

        try {
            const activeConfigs = (currentActiveTab === 'MONRE') ? GAUGE_CONFIGS : GAUGE_CONFIGS_REALTIME;
            const { start_time, end_time } = getRangeQueryParams();
            let gaugeBaseUrl = '';
            let chartBaseUrl = '';
            
            if (currentActiveTab === 'CONSUMPTION') {
                applyConsumptionDefaultRange();
                gaugeBaseUrl = `/api/kpi/volume-consumption?tag_key=totalIndex&interval_mins=30&station_ids=`;
                chartBaseUrl = `/api/kpi/volume-consumption?tag_key=totalIndex&interval_mins=30&start_time=${encodeURIComponent(start_time)}&end_time=${encodeURIComponent(end_time)}&station_ids=`;
                document.getElementById('chartTitle').innerHTML = '<i class="fa-solid fa-chart-bar" style="color: #10b981; margin-right: 6px;"></i>BIỂU ĐỒ SẢN LƯỢNG (m³)';
            } else {
                gaugeBaseUrl = `/api/kpi/flow-summary?tag_key=flow&interval_mins=30&station_ids=`;
                chartBaseUrl = `/api/kpi/flow-summary?tag_key=flow&interval_mins=30&start_time=${encodeURIComponent(start_time)}&end_time=${encodeURIComponent(end_time)}&station_ids=`;
                document.getElementById('chartTitle').innerHTML = '<i class="fa-solid fa-chart-line" style="color: #10b981; margin-right: 6px;"></i>BIỂU ĐỒ LƯU LƯỢNG(m³/h)';
            }

            const gaugeFetchPromises = activeConfigs.map(cfg => fetch(gaugeBaseUrl + cfg.stationIds).then(res => res.json()));
            const chartFetchPromises = activeConfigs.map(cfg => fetch(chartBaseUrl + cfg.stationIds).then(res => res.json()));
            const [gaugeResults, chartResults] = await Promise.all([
                Promise.all(gaugeFetchPromises),
                Promise.all(chartFetchPromises)
            ]);
            let primaryLabels = [];

            gaugeResults.forEach((data, index) => {
                const cfg = activeConfigs[index];
                if (data.success && gaugeInstances[cfg.id]) {
                    if (currentActiveTab === 'CONSUMPTION') {
                        const selectedValue = data.metrics && data.metrics.selected ? Number(data.metrics.selected.value) || 0 : (data.metrics && data.metrics.daily ? Number(data.metrics.daily.value) || 0 : 0);
                        gaugeInstances[cfg.id].setValue(selectedValue);

                    } else {
                        gaugeInstances[cfg.id].setValue(data.total_instant_flow || 0);
                    }
                }
            });

            chartResults.forEach((data, index) => {
                const cfg = activeConfigs[index];
                if (!data.success || !hChart || !hChart.data.datasets[index]) return;

                const chartData = Array.isArray(data.chart_data) ? data.chart_data : [];

                if (!primaryLabels.length && chartData.length > 0) {
                    primaryLabels = chartData.map(item => {
                        if (currentActiveTab === 'CONSUMPTION') {
                            return new Date(item.timestamp).toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                        }

                        return new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                    });
                }

                if (currentActiveTab === 'CONSUMPTION') {
                    hChart.data.datasets[index].label = `${cfg.title} (m³)`;
                } else {
                    hChart.data.datasets[index].label = `${cfg.title} (Tức thời m³/h)`;
                }

                hChart.data.datasets[index].data = chartData.map(item => Number(item.value) || 0);
            });

            if (hChart) {
                if (!primaryLabels.length) {
                    const fallbackSeries = chartResults.find(item => item?.success && Array.isArray(item.chart_data) && item.chart_data.length > 0);
                    if (fallbackSeries) {
                        primaryLabels = fallbackSeries.chart_data.map(item => {
                            if (currentActiveTab === 'CONSUMPTION') {
                                return new Date(item.timestamp).toLocaleDateString([], { day: '2-digit', month: '2-digit' });
                            }

                            return new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                        });
                    }
                }
                hChart.data.labels = primaryLabels;
                hChart.update();
                updateChartVisibility();
            }

            // --- SYNC ĐỒNG BỘ BẢNG BÁO LỖI ---
            const resOverview = await fetch('/api/overview/latest');
            const overviewResult = await resOverview.json();
            const tableBody = document.getElementById('offlineTableBody');
            
            if (overviewResult.success && Array.isArray(overviewResult.data) && tableBody) {
                tableBody.innerHTML = '';
                let totalGlobal = overviewResult.data.length, offlineCount = 0, violationCount = 0, hasErrors = 0;

                overviewResult.data.forEach(st => {
                    const isOnline = (String(st.last_known_status).toLowerCase().trim() === 'online');
                    if (!isOnline) {
                        offlineCount++; hasErrors++;
                        tableBody.insertAdjacentHTML('beforeend', `
                            <tr style="background: #fff5f5;">
                                <td><strong>${st.display_name || st.logger_id}</strong></td>
                                <td style="text-align: center;">-</td>
                                <td style="text-align: center; color:#94a3b8;">Mất kết nối</td>
                                <td style="text-align: center; color:#e11d48;">Mất tín hiệu</td>
                                <td style="text-align: center;"><span class="badge-danger">🔴 Offline</span></td>
                            </tr>`);
                    }
                    if (st.tags) {
                        let stationHasViolation = false;
                        Object.keys(st.tags).forEach(tk => {
                            const tagInfo = st.tags[tk];
                            if (tagInfo && tagInfo.threshold_enabled && tagInfo.value !== null) {
                                const cv = parseFloat(tagInfo.value), maxv = tagInfo.max_value ? parseFloat(tagInfo.max_value) : null, minv = tagInfo.min_value ? parseFloat(tagInfo.min_value) : null;
                                if ((maxv && cv > maxv) || (minv && cv < minv)) {
                                    stationHasViolation = true; hasErrors++;
                                    tableBody.insertAdjacentHTML('beforeend', `
                                        <tr style="background: #fffbeb;">
                                            <td>${st.display_name || st.logger_id}</td>
                                            <td style="text-align: center;">-</td>
                                            <td style="text-align: center; font-weight:700;">${tk.toUpperCase()}</td>
                                            <td style="text-align: center; color:#d97706;"><b>${cv}</b> (Vượt ngưỡng)</td>
                                            <td style="text-align: center;"><span class="badge-danger" style="background:#fef3c7; color:#d97706;">⚠️ Vi phạm</span></td>
                                        </tr>`);
                                }
                            }
                        });
                        if (stationHasViolation) violationCount++;
                    }
                });

                document.getElementById("lblOfflineSummary").innerText = String(offlineCount).padStart(2, '0');
                document.getElementById("lblViolationSummary").innerText = String(violationCount).padStart(2, '0');
                document.querySelectorAll(".lbl-total-summary").forEach(el => el.innerText = String(totalGlobal).padStart(2, '0'));
                if (hasErrors === 0) tableBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #10b981; font-weight: 600;">✅ Toàn bộ hệ thống ổn định!</td></tr>`;
            }
        } catch (error) { console.error(error); }
    }

    const btnRef = document.getElementById('btnRefreshOverview');
    if(btnRef) btnRef.addEventListener('click', fetchDataOverview);

    initModule();
    const refreshIntervalId = setInterval(fetchDataOverview, 30000);
    const destObserver = new MutationObserver(() => {
        if (!document.getElementById("offlineTableBody")) {
            clearInterval(refreshIntervalId); destObserver.disconnect();
        }
    });
    destObserver.observe(document.getElementById("mainContent") || document.body, { childList: true });
})();
</script>
</body>
</html>
