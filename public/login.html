<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống CAWACO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-surface: #ffffff;
            --bg-soft: #f8fafc;
            --color-primary: #14b8a6;
            --color-hover: #2dd4bf;
            --color-active: #0d9488;
            --text-main: #f8fafc;
            --text-dark: #0f172a;
            --text-muted: #94a3b8;
            --border-color: rgba(15, 23, 42, 0.08);
            --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
            --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.18);
            --space: 5px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space);
            background:
                radial-gradient(circle at top, rgba(20, 184, 166, 0.18), transparent 35%),
                linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: var(--text-main);
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            opacity: 0.25;
        }

        .login-box {
            position: relative;
            width: min(100%, 420px);
            background: rgba(255, 255, 255, 0.96);
            color: var(--text-dark);
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(14px);
            display: flex;
            flex-direction: column;
            gap: var(--space);
        }

        h2 {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            text-align: center;
            color: var(--color-active);
            margin-bottom: 10px;
            letter-spacing: 0.08em;
        }

        .input-group {
            position: relative;
            margin-bottom: 10px;
        }

        .input-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 0;
            box-sizing: border-box;
            font-size: 14px;
            min-height: 40px;
            background: var(--bg-surface);
            color: var(--text-dark);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-group input:focus {
            border-color: rgba(20, 184, 166, 0.55);
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.12);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, var(--color-active), var(--color-primary));
            color: white;
            border: none;
            border-radius: 0;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            min-height: 42px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        button:hover {
            background: linear-gradient(90deg, var(--color-active), var(--color-hover));
            transform: translateY(-1px);
        }

        .err-msg {
            color: #dc2626;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
            display: none;
            padding: 5px;
            background: #fef2f2;
            border: 1px solid #fecaca;
        }

        @media (max-width: 480px) {
            body {
                align-items: stretch;
            }

            .login-box {
                width: 100%;
                max-width: 420px;
                margin: auto;
                padding: 15px;
            }

            h2 {
                gap: 5px;
                margin-bottom: 5px;
            }

            .input-group {
                margin-bottom: 5px;
            }

            .input-group input,
            button {
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>
            <img src="/images/logo.png" alt="Logo CAWACO" style="height: 60px; width: auto; object-fit: contain;">
            <span>CAWACO LOGIN</span>
        </h2>
        <div id="errMsg" class="err-msg"></div>
        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="username" placeholder="Tên đăng nhập" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit">ĐĂNG NHẬP</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errMsg = document.getElementById('errMsg');
            
            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const resData = await response.json();
                if(resData.success) {
                    window.location.href = '/layout';
                } else {
                    errMsg.innerText = resData.message;
                    errMsg.style.display = 'block';
                }
            } catch (err) {
                errMsg.innerText = "Lỗi kết nối Server.";
                errMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
