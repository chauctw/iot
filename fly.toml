# fly.toml app configuration file generated for iot-logger on 2026-07-08T13:01:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iot-logger'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
